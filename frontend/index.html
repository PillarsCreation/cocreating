<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>红门哨兵 · 校园智能体（平急结合）</title>
<!-- 设计系统四件套（全部本地化，断网可演示）：
     TDesign 政务风组件样式 + Remix Icon 图标 + ECharts 图表 + 自有设计令牌层 -->
<link rel="stylesheet" href="/static/vendor/tdesign.min.css">
<link rel="stylesheet" href="/static/vendor/remixicon.css">
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<!-- ================= 登录 ================= -->
<div id="login-view" class="login-view">
  <div class="login-grid">
    <div class="brand-side">
      <div class="brand-badge"><i class="ri-shield-star-line"></i></div>
      <h1>红门哨兵</h1>
      <div class="sub">大兴区西红门实验二小 · 校园智能体<br>急时安全哨兵 × 平时教联体数字底座</div>
      <div class="feat"><i class="ri-radar-line"></i><div><b>四层闭环</b><span>感知 → 认知（本体多模态融合）→ 决策（预案矩阵）→ 处置（工单/通知回执）</span></div></div>
      <div class="feat"><i class="ri-user-heart-line"></i><div><b>一人一档，不一人一号</b><span>学生不设账号，健康/体测/成绩/选修课档案由家长账号内嵌查看，三级守卫控权</span></div></div>
      <div class="feat"><i class="ri-community-line"></i><div><b>校社联动</b><span>共享空间平急两用 · 随手拍 AI 分类派单 · 场馆口碑互助</span></div></div>
    </div>
    <div class="acct-panel">
      <div class="hd"><i class="ri-shield-user-line"></i> 选择身份进入系统</div>
      <div id="quick-panel"></div>
      <div class="login-err" id="li-err"></div>
      <div class="login-note">演示环境 · 点选身份进入 · 学生实行「一人一档、不一人一号」，档案由家长账号内嵌查看</div>
    </div>
  </div>
</div>

<!-- ================= 主应用 ================= -->
<div id="app-view" class="hidden" style="display:none">
<header class="app-header">
  <span class="logo"><i class="ri-shield-star-line"></i> 红门哨兵</span>
  <span id="mode-pill" class="t-tag t-tag--success t-tag--dark"><i class="ri-checkbox-circle-line"></i> 正常运行</span>
  <span class="spacer"></span>
  <span class="who" id="who"></span>
  <button class="logout" onclick="logout()"><i class="ri-logout-box-r-line"></i> 退出</button>
</header>
<nav id="nav" class="app-nav"></nav>
<main id="main"></main>

<button class="chat-fab" onclick="toggleChat()" title="智能助手"><i class="ri-robot-2-line"></i></button>
<div class="chat-panel" id="chat-panel" style="display:none">
  <div class="head"><i class="ri-sparkling-2-line"></i> 智能助手（角色感知意图路由）</div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-in">
    <input id="chat-input" class="native" placeholder="输入问题…" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="t-button t-button--theme-primary t-button--variant-base t-size-s" onclick="sendChat()"><i class="ri-send-plane-fill"></i></button>
  </div>
</div>
</div>

<script src="/static/vendor/echarts.min.js"></script>
<script src="/static/js/core.js"></script>
<script src="/static/js/pages.js"></script>
<script>initLogin();</script>
</body>
</html>
