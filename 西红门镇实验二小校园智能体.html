<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西红门镇实验二小校园智能体</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tdesign-vue-next/dist/tdesign.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<style>


/* ==================== 设计令牌 ==================== */
:root {
  --app-font: "PingFang SC", "MiSans", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif;
  /* 间距阶梯（4px 网格） */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;
  /* 字号阶梯 */
  --fs-xs: 12px; --fs-sm: 13px; --fs-md: 14px; --fs-lg: 15px; --fs-xl: 18px; --fs-num: 28px;
  /* 圆角与阴影层级 */
  --r-md: 8px; --r-lg: 12px;
  --shadow-1: 0 1px 2px rgba(13, 42, 82, .04), 0 2px 8px rgba(13, 42, 82, .06);
  --shadow-2: 0 4px 16px rgba(13, 42, 82, .10);
  --shadow-3: 0 8px 32px rgba(13, 42, 82, .14);
  /* 品牌与语义色（浅色 = TDesign 政务蓝体系） */
  --brand: var(--td-brand-color, #0052d9);
  --ink: var(--td-text-color-primary, rgba(0,0,0,.9));
  --ink-2: var(--td-text-color-secondary, rgba(0,0,0,.6));
  --ink-3: var(--td-text-color-placeholder, rgba(0,0,0,.4));
  --line: var(--td-component-border, #dcdcdc);
  --bg-page: #f2f4f8;
  --bg-card: #ffffff;
  --chain-bg: #0d2144;
  --chain-txt: #a9d3ff;
  /* v5 新增：毛玻璃变量（浅色模式） */
  --glass-bg: rgba(255, 255, 255, 0.72);
  --glass-border: rgba(255, 255, 255, 0.18);
  --glass-blur: blur(20px);
  /* v5 新增：发光色 */
  --glow-cyan: rgba(40, 209, 232, 0.4);
  --glow-brand: rgba(0, 82, 217, 0.3);
}

:root[theme-mode="dark"] {
  --shadow-1: 0 2px 10px rgba(0, 0, 0, .35);
  --shadow-2: 0 6px 24px rgba(0, 0, 0, .45);
  --shadow-3: 0 12px 48px rgba(0, 0, 0, .55);
  --brand: #4d9fff;
  --line: #22406e;
  --bg-page: #081226;
  --bg-card: #0e1c3c;
  --ink: #dbe7ff; --ink-2: #8fa9d6; --ink-3: #5c7099;
  --chain-bg: #060e22; --chain-txt: #7fd4ff;
  /* v5 新增：深色毛玻璃 */
  --glass-bg: rgba(14, 28, 60, 0.78);
  --glass-border: rgba(40, 209, 232, 0.12);
  --glass-blur: blur(20px);
  /* v5 新增：深色发光色 */
  --glow-cyan: rgba(40, 209, 232, 0.5);
  --glow-brand: rgba(77, 159, 255, 0.35);
}

/* ==================== 全局重置与基础 ==================== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: var(--app-font); background: var(--bg-page); color: var(--ink); font-size: var(--fs-md); }
i[class^="ri-"], i[class*=" ri-"] { line-height: 1; vertical-align: -0.12em; }
.muted { color: var(--ink-2); font-size: var(--fs-xs); }
.spin { display: inline-block; animation: rot 1s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

/* ==================== 登录页 ==================== */
/* v5：新增 60 度交叉网格纹理背景 */
.login-view {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-6);
  background:
    repeating-linear-gradient(
      60deg,
      transparent,
      transparent 40px,
      rgba(40, 209, 232, 0.03) 40px,
      rgba(40, 209, 232, 0.03) 41px
    ),
    repeating-linear-gradient(
      -60deg,
      transparent,
      transparent 40px,
      rgba(40, 209, 232, 0.02) 40px,
      rgba(40, 209, 232, 0.02) 41px
    ),
    radial-gradient(1200px 700px at 20% 0%, #14498f 0%, #0d2a52 45%, #081226 100%);
}
.login-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; max-width: 980px; width: 100%; align-items: center; }
@media (max-width: 900px) { .login-grid { grid-template-columns: 1fr; gap: 28px; } }

/* v5：品牌徽章多层光晕 */
.brand-side { color: #eaf2ff; }
.brand-badge {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1a66cc, #0fa8bd);
  font-size: 34px; color: #fff;
  margin-bottom: var(--sp-5);
  /* v5：双层 box-shadow 模拟发光 */
  box-shadow:
    0 0 20px rgba(15, 168, 189, 0.35),
    0 0 60px rgba(15, 168, 189, 0.15),
    0 10px 30px rgba(15, 168, 189, 0.35);
}
.brand-side h1 { font-size: 30px; letter-spacing: 3px; margin: 0 0 var(--sp-2); }
.brand-side .sub { color: #9db8dd; font-size: var(--fs-md); line-height: 1.9; margin-bottom: var(--sp-6); }

/* v5：feat 条目 hover 微动效 */
.feat {
  display: flex; gap: var(--sp-3); align-items: flex-start;
  margin-bottom: var(--sp-4);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-md);
  transition: transform .2s ease, background .2s ease;
}
.feat:hover {
  transform: translateY(-2px);
  background: rgba(40, 209, 232, 0.06);
}
.feat i { font-size: 18px; color: #28d1e8; margin-top: 2px; }
.feat b { display: block; font-size: var(--fs-md); }
.feat span { color: #8aa6cf; font-size: var(--fs-xs); line-height: 1.7; }

/* v5：acct-panel 增强 backdrop-filter + 渐变边框 */
.acct-panel {
  position: relative;
  background: rgba(255, 255, 255, 0.06);
  border: none;
  border-radius: 16px;
  padding: var(--sp-5);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
/* v5：伪元素渐变边框 */
.acct-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, rgba(122, 168, 255, 0.4), rgba(40, 209, 232, 0.2), rgba(122, 168, 255, 0.1));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.acct-panel .hd { color: #cfe0fa; font-size: var(--fs-sm); margin-bottom: var(--sp-3); display: flex; align-items: center; gap: 6px; }
.acct {
  display: flex; align-items: center; gap: var(--sp-3);
  background: rgba(255,255,255,.05); border: 1px solid rgba(122,168,255,.22);
  border-radius: var(--r-lg); padding: 13px 16px; color: #fff; cursor: pointer;
  margin-bottom: var(--sp-2); transition: all .2s ease;
}
.acct:hover { background: rgba(77,159,255,.16); border-color: #4d9fff; transform: translateX(4px); }
.acct .av {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; flex: none;
}
.acct .nm { flex: 1; min-width: 0; }
.acct .nm b { font-size: var(--fs-lg); }
.acct .nm .meta { font-size: var(--fs-xs); color: #9db8dd; margin-top: 2px; }
.acct .go { color: #7fb5ff; font-size: 18px; }
.login-note { color: #6d86ad; font-size: var(--fs-xs); margin-top: var(--sp-3); line-height: 1.8; }
.login-err { color: #ff8f8a; font-size: var(--fs-sm); min-height: 18px; margin-top: var(--sp-2); }

/* ==================== 应用框架 ==================== */
/* v5：底部发光线 */
.app-header {
  height: 56px;
  display: flex; align-items: center; gap: var(--sp-4);
  padding: 0 var(--sp-6);
  background: linear-gradient(90deg, #0d2a52, #123a74);
  color: #fff;
  position: sticky; top: 0; z-index: 50;
  /* v5：底部发光线 */
  box-shadow: 0 1px 0 0 rgba(40, 209, 232, 0.3), 0 2px 12px rgba(40, 209, 232, 0.1);
}
body.dark .app-header {
  background: linear-gradient(90deg, #060e22, #0a1c40);
  border-bottom: none;
  /* v5：深色模式下发光线增强 */
  box-shadow: 0 1px 0 0 rgba(40, 209, 232, 0.4), 0 2px 20px rgba(40, 209, 232, 0.15);
}
.app-header .logo { display: flex; align-items: center; gap: var(--sp-2); font-size: 16px; font-weight: 700; letter-spacing: 1px; }
.app-header .logo i { font-size: 22px; color: #28d1e8; }
.app-header .spacer { flex: 1; }
.app-header .who { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--fs-sm); opacity: .92; }

/* v5：导航栏毛玻璃效果 */
.app-nav {
  display: flex; gap: var(--sp-1);
  padding: 0 var(--sp-5);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  overflow-x: auto;
  position: sticky; top: 56px; z-index: 49;
}
.app-nav button {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 14px 14px; font-size: var(--fs-md); font-family: var(--app-font);
  color: var(--ink-2);
  border-bottom: 2.5px solid transparent; white-space: nowrap;
  transition: color .15s ease, border-color .15s ease;
}
.app-nav button i { font-size: 16px; }
.app-nav button:hover { color: var(--brand); }
.app-nav button.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 600; }

/* v5：main 区域增加 section 级间距节奏 */
main {
  max-width: 1200px;
  margin: var(--sp-5) auto;
  padding: 0 var(--sp-5);
  display: flex;
  flex-direction: column;
  gap: var(--sp-5);
}
.page-loading, .page-err {
  display: flex; align-items: center; gap: var(--sp-2);
  color: var(--ink-2);
  padding: 48px 0; justify-content: center; font-size: var(--fs-md);
}

/* ==================== 面板 / KPI ==================== */
.panel {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
  margin-bottom: var(--sp-4);
  overflow: hidden;
  transition: box-shadow .25s ease;
}
.panel:hover { box-shadow: var(--shadow-2); }

/* v5：深色模式面板渐变发光边框（伪元素） */
body.dark .panel {
  box-shadow: inset 0 0 30px rgba(40, 209, 232, .03), var(--shadow-1);
  border-color: rgba(40, 209, 232, 0.15);
}
body.dark .panel::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--r-lg);
  padding: 1px;
  background: linear-gradient(
    135deg,
    rgba(40, 209, 232, 0.2) 0%,
    rgba(77, 159, 255, 0.08) 50%,
    rgba(40, 209, 232, 0.15) 100%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.panel-hd {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}
.panel-hd i { color: var(--brand); font-size: 17px; }
/* v5：panel-hd 标题 letter-spacing 微调 */
.panel-hd h3 { margin: 0; font-size: var(--fs-lg); font-weight: 600; letter-spacing: 0.3px; }
.panel-hd .panel-desc { color: var(--ink-3); font-size: var(--fs-xs); }
.panel-hd .extra { margin-left: auto; }
.panel-bd { padding: var(--sp-4) 18px; }

.grid { display: grid; gap: var(--sp-4); }
.g2 { grid-template-columns: 1fr 1fr; align-items: start; }
.span2 { grid-column: 1 / -1; }
@media (max-width: 900px) { .g2 { grid-template-columns: 1fr; } }

/* KPI 行 */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--sp-4);
  margin-bottom: var(--sp-4);
}
.kpi {
  position: relative;
  display: flex; gap: var(--sp-3); align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-4);
  box-shadow: var(--shadow-1);
  transition: transform .2s ease, box-shadow .2s ease;
  overflow: hidden;
}
/* v5：KPI 卡 hover 微抬升 */
.kpi:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-2);
}
.kpi .ic {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 21px; flex: none;
  background: rgba(0,82,217,.08); color: var(--brand);
}
.kpi.warn .ic { background: rgba(227,115,24,.1); color: #e37318; }
.kpi.bad .ic { background: rgba(213,73,65,.1); color: #d54941; }
.kpi.good .ic { background: rgba(43,164,113,.1); color: #2ba471; }
.kpi .num {
  font-size: var(--fs-num); font-weight: 700; line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.kpi.warn .num { color: #e37318; }
.kpi.bad .num { color: #d54941; }
.kpi.good .num { color: #2ba471; }
.kpi .lbl { font-size: var(--fs-xs); color: var(--ink-2); margin-top: 3px; line-height: 1.5; }

/* v5：深色模式 KPI 顶部渐变线 */
body.dark .kpi {
  border-top: none;
}
body.dark .kpi::after {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #28d1e8, rgba(40, 209, 232, 0.1));
  border-radius: 2px 2px 0 0;
}
body.dark .kpi .num {
  color: #28d1e8;
  /* v5：增强 text-shadow 发光 */
  text-shadow: 0 0 14px rgba(40, 209, 232, .4), 0 0 30px rgba(40, 209, 232, .15);
}
body.dark .kpi .ic { background: rgba(40,209,232,.1); color: #28d1e8; }

/* ==================== v5 新增：stat-card 紧凑指标卡 ==================== */
.stat-card {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4);
  transition: transform .2s ease, box-shadow .2s ease;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-2);
}
.stat-card .stat-val {
  font-size: 22px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  font-family: Bahnschrift, "DIN Alternate", "Segoe UI", var(--app-font);
  line-height: 1.2;
}
.stat-card .stat-lbl {
  font-size: var(--fs-xs);
  color: var(--ink-2);
  line-height: 1.4;
}
.stat-card .stat-chg {
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.stat-card .stat-chg.up { color: #2ba471; }
.stat-card .stat-chg.down { color: #d54941; }

/* ==================== 表格 ==================== */
.tbl {
  width: 100%;
  border-collapse: collapse;
  border-spacing: 0;
  font-size: var(--fs-sm);
}
/* v5：固定表头 */
.tbl thead { position: sticky; top: 0; z-index: 2; }
.tbl th {
  text-align: left; color: var(--ink-2); font-weight: 500; font-size: var(--fs-xs);
  padding: 8px 10px; border-bottom: 1px solid var(--line);
  background: rgba(0,82,217,.025);
}
body.dark .tbl th {
  background: rgba(40, 209, 232, 0.06);
  color: #9fd8ff;
}
.tbl td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover td { background: rgba(0,82,217,.03); }
body.dark .tbl tbody tr:hover td { background: rgba(40,209,232,.05); }

/* v5：深色模式交替行背景 */
body.dark .tbl tbody tr:nth-child(even) td {
  background: rgba(40, 209, 232, 0.02);
}

/* ==================== 列表 / 通知 / 空态 ==================== */
/* v5：list-item 左侧时间轴装饰线 */
.list-item {
  padding: var(--sp-3) var(--sp-3) var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
  border-left: 2px solid var(--brand);
  margin-left: 0;
  transition: background .15s ease;
}
.list-item:hover {
  background: rgba(0, 82, 217, 0.03);
}
.list-item:last-child { border-bottom: none; }

/* v5：notice 毛玻璃效果 */
.notice {
  display: flex; gap: var(--sp-2);
  border-left: 3px solid var(--brand);
  background: rgba(0,82,217,.05);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  padding: var(--sp-3) var(--sp-4);
  border-radius: 0 var(--r-md) var(--r-md) 0;
  margin-bottom: var(--sp-3);
  font-size: var(--fs-sm);
  line-height: 1.7;
  transition: transform .15s ease;
}
.notice:hover { transform: translateX(2px); }
.notice > i { font-size: 17px; margin-top: 2px; color: var(--brand); flex: none; }
.notice.important { border-color: #e37318; background: rgba(227,115,24,.07); }
.notice.important > i { color: #e37318; }
.notice.emergency { border-color: #d54941; background: rgba(213,73,65,.07); }
.notice.emergency > i { color: #d54941; }
.notice .bd { flex: 1; min-width: 0; }
.empty { text-align: center; color: var(--ink-3); padding: var(--sp-6) 0; }
.empty i { font-size: 34px; display: block; margin-bottom: var(--sp-2); opacity: .6; }
.empty p { margin: 0; font-size: var(--fs-sm); }

pre.chain {
  background: var(--chain-bg); color: var(--chain-txt);
  font-size: var(--fs-xs); padding: var(--sp-3);
  border-radius: var(--r-md); white-space: pre-wrap; line-height: 1.75;
  margin: var(--sp-2) 0 0;
  font-family: "JetBrains Mono", Consolas, monospace;
}
.vchart { width: 100%; }

/* ==================== v5 新增：badge 数字徽标 ==================== */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  color: #fff;
  background: var(--brand);
}
.badge.danger { background: #d54941; }
.badge.warn { background: #e37318; }
.badge.success { background: #2ba471; }

/* ==================== 业务组件 ==================== */
.scen-btn {
  display: block; width: 100%; text-align: left;
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: var(--r-md); padding: 11px 14px; margin-bottom: var(--sp-2);
  color: var(--ink); cursor: pointer;
  font-family: var(--app-font); font-size: var(--fs-sm);
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
.scen-btn:hover { border-color: var(--brand); box-shadow: var(--shadow-1); transform: translateX(2px); }
.scen-btn b { display: flex; align-items: center; gap: 6px; }
.scen-btn b i { color: var(--brand); }

.timeline {
  font-size: var(--fs-xs); line-height: 2.1;
  background: var(--bg-page); border: 1px solid var(--line);
  border-radius: var(--r-md); padding: var(--sp-3);
  margin-top: var(--sp-3); max-height: 260px; overflow: auto;
}

/* v5：日历格子选中态弹跳动画 */
.cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: var(--sp-2); }
.cal .hd { text-align: center; font-size: var(--fs-xs); color: var(--ink-3); padding: 4px 0; }
.cal .d {
  text-align: center; padding: 9px 0;
  border: 1px solid var(--line); border-radius: var(--r-md);
  font-size: var(--fs-sm); cursor: pointer;
  background: var(--bg-card); font-variant-numeric: tabular-nums;
  transition: all .2s ease;
}
.cal .d:hover { border-color: var(--brand); transform: scale(1.04); }
/* v5：选中态弹跳动画 */
.cal .d.on {
  background: var(--brand); color: #fff; border-color: var(--brand);
  animation: calBounce .3s ease;
}
@keyframes calBounce {
  0% { transform: scale(0.95); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.cal .d.off {
  background: var(--bg-page); color: var(--ink-3);
  cursor: not-allowed; border-style: dashed;
}
.cal .d.off:hover { border-color: var(--line); transform: none; }
.cal .d.blank { border: none; background: none; cursor: default; }

/* v5：course 卡片 hover 增强阴影 + 微抬升 */
.course {
  border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: var(--sp-4); margin-bottom: var(--sp-3);
  background: var(--bg-card);
  transition: transform .2s ease, box-shadow .2s ease;
}
.course:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-2);
}
.course.rec { border-color: var(--brand); background: rgba(0,82,217,.03); box-shadow: 0 2px 12px rgba(0,82,217,.08); }
.course .ttl { display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap; }
.course .ttl b { font-size: var(--fs-lg); }
.course .why { font-size: var(--fs-xs); color: var(--ink-2); margin-top: var(--sp-2); line-height: 1.8; }
.course .why i { color: var(--brand); margin-right: 4px; }

.gauge-num { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; }

/* v5：route-bar 进度条渐变色和动画 */
.route-bar { height: 8px; border-radius: 4px; background: var(--line); overflow: hidden; margin-top: 5px; }
.route-bar i {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--brand), #28d1e8);
  border-radius: 4px;
  animation: routeGrow .8s ease;
}
@keyframes routeGrow {
  from { width: 0 !important; }
}
body.dark .route-bar i {
  background: linear-gradient(90deg, #28d1e8, #4d9fff);
}

/* v5：profile-hero 背景装饰光斑 */
.profile-hero {
  position: relative;
  display: flex; align-items: center; gap: var(--sp-4);
  padding: var(--sp-4);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.profile-hero::before {
  content: "";
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(40, 209, 232, 0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.profile-hero .av {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, #1a66cc, #0fa8bd);
  color: #fff; font-size: 24px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex: none;
  position: relative;
  z-index: 1;
}

.form-row { margin-bottom: var(--sp-3); }
.form-row label { display: block; font-size: var(--fs-xs); color: var(--ink-2); margin-bottom: 6px; }
input.native {
  width: 100%; border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 8px 12px; font-size: var(--fs-md); font-family: var(--app-font);
  background: var(--bg-card); color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
}
input.native:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(0,82,217,.1); }

/* ==================== v5 新增：hero-stat 大数据展示 ==================== */
.hero-stat {
  text-align: center;
  padding: var(--sp-5);
}
.hero-stat .hero-num {
  font-size: 52px;
  font-weight: 800;
  font-family: Bahnschrift, "DIN Alternate", "Segoe UI", var(--app-font);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  background: linear-gradient(135deg, #28d1e8, #4d9fff, #28d1e8);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: heroGradient 3s ease infinite;
}
@keyframes heroGradient {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.hero-stat .hero-lbl {
  font-size: var(--fs-sm);
  color: var(--ink-2);
  margin-top: var(--sp-2);
  letter-spacing: 1px;
}
.hero-stat .hero-sub {
  font-size: var(--fs-xs);
  color: var(--ink-3);
  margin-top: var(--sp-1);
}

/* ==================== v5 新增：progress-ring 圆环进度 ==================== */
.progress-ring {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-2);
}
.progress-ring svg {
  transform: rotate(-90deg);
  filter: drop-shadow(0 0 6px rgba(40, 209, 232, 0.3));
}
.progress-ring .ring-bg {
  fill: none;
  stroke: var(--line);
  stroke-width: 6;
}
.progress-ring .ring-fg {
  fill: none;
  stroke: #28d1e8;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
body.dark .progress-ring .ring-fg {
  stroke: #28d1e8;
  filter: drop-shadow(0 0 8px rgba(40, 209, 232, 0.5));
}
.progress-ring .ring-val {
  font-size: var(--fs-lg);
  font-weight: 700;
  font-family: Bahnschrift, "DIN Alternate", "Segoe UI", var(--app-font);
  font-variant-numeric: tabular-nums;
}
.progress-ring .ring-lbl {
  font-size: var(--fs-xs);
  color: var(--ink-2);
}

/* ==================== 智能助手 ==================== */
/* v5：chat-fab 呼吸灯动画 */
.chat-fab {
  position: fixed; right: 26px; bottom: 26px;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #0052d9, #0fa8bd);
  color: #fff; font-size: 23px; border: none; cursor: pointer;
  box-shadow: 0 8px 24px rgba(0, 82, 217, .4);
  z-index: 60; display: flex; align-items: center; justify-content: center;
  /* v5：呼吸灯脉冲 */
  animation: chatPulse 2.5s ease-in-out infinite;
}
@keyframes chatPulse {
  0%, 100% { box-shadow: 0 8px 24px rgba(0, 82, 217, .4), 0 0 0 0 rgba(40, 209, 232, 0.3); }
  50% { box-shadow: 0 8px 24px rgba(0, 82, 217, .4), 0 0 0 12px rgba(40, 209, 232, 0); }
}

/* v5：chat-panel 毛玻璃效果 */
.chat-panel {
  position: fixed; right: 26px; bottom: 92px;
  width: 340px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-3);
  z-index: 60; display: flex; flex-direction: column; max-height: 460px; overflow: hidden;
}
.chat-panel .head {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: 12px 16px;
  background: linear-gradient(90deg, #0d2a52, #123a74);
  color: #fff; font-size: var(--fs-md);
}
.chat-msgs {
  flex: 1; overflow: auto;
  padding: var(--sp-3);
  display: flex; flex-direction: column; gap: var(--sp-2);
  min-height: 120px;
}
.msg {
  max-width: 86%;
  padding: 8px 12px;
  border-radius: 10px; font-size: var(--fs-sm);
  line-height: 1.7; white-space: pre-wrap;
}

/* v5：msg.me 渐变背景 */
.msg.me {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--brand), #0a6fd9);
  color: #fff;
  box-shadow: 0 2px 8px rgba(0, 82, 217, 0.2);
}

/* v5：msg.bot 左侧品牌色竖线装饰 */
.msg.bot {
  align-self: flex-start;
  background: var(--bg-page);
  border: none;
  border-left: 3px solid var(--brand);
  border-radius: 0 10px 10px 0;
  padding-left: var(--sp-4);
}
body.dark .msg.bot {
  border-left-color: #28d1e8;
  background: rgba(14, 28, 60, 0.5);
}

.chat-in {
  display: flex; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3) var(--sp-3);
  border-top: 1px solid var(--glass-border);
}

/* ==================== 细节质感层 ==================== */
/* KPI 数字用 DIN 风格字体，等宽数字避免跳动 */
.kpi .num, .gauge-num, .t-statistic, .hero-stat .hero-num {
  font-family: Bahnschrift, "DIN Alternate", "Segoe UI", var(--app-font);
}

/* v5：slideUp 进场动画（比 fadein 更有动感） */
main > * { animation: slideUp .35s cubic-bezier(0.23, 1, 0.32, 1); }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: none; }
}
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* v5：pulse 呼吸灯 */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes blink { 50% { opacity: .5; } }
.blink { animation: blink 1.2s infinite; }

/* v5：骨架屏 shimmer 保持并加圆角 */
.skl {
  border-radius: var(--r-lg);
  background: linear-gradient(100deg, var(--bg-card) 40%, rgba(0,82,217,.06) 50%, var(--bg-card) 60%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite linear;
  border: 1px solid var(--line);
  margin-bottom: var(--sp-4);
}
body.dark .skl {
  background: linear-gradient(100deg, var(--bg-card) 40%, rgba(40,209,232,.08) 50%, var(--bg-card) 60%);
  background-size: 200% 100%;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* v5：toast 毛玻璃背景 */
.toast {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-2);
  border-radius: var(--r-md);
  padding: 10px 18px; z-index: 99;
  display: flex; gap: var(--sp-2); align-items: center;
  font-size: var(--fs-sm);
  animation: slideUp .2s ease;
  max-width: 70vw;
}
.toast.success i { color: #2ba471; }
.toast.error i { color: #d54941; }
.toast i { font-size: 17px; }

/* TDesign 无紫色 tag，补一个 */
.t-tag--purple.t-tag--light { background: #f3ebfd; color: #7b46d1; }
body.dark .t-tag--purple.t-tag--light { background: #2a1b4a; color: #c39fff; }
.t-tag i { margin-right: 3px; }

/* 原生表单件统一皮肤 */
input.native, select.native, textarea.native {
  width: 100%; border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 8px 12px; font-size: var(--fs-md); font-family: var(--app-font);
  background: var(--bg-card); color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
}
input.native:focus, select.native:focus, textarea.native:focus {
  outline: none; border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(0,82,217,.12);
}
select.native.inline, input.native.inline { width: auto; }

/* 顶栏运行模式徽标与退出按钮 */
#mode-pill { display: inline-flex; align-items: center; gap: 5px; }
.app-header .logout {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.14); border: none;
  color: #fff; padding: 7px 14px; border-radius: 6px;
  cursor: pointer; font-size: var(--fs-sm); font-family: var(--app-font);
  transition: background .15s ease;
}
.app-header .logout:hover { background: rgba(255,255,255,.24); }

/* ==================== v5 新增：glow-text 文字发光 ==================== */
.glow-text {
  text-shadow:
    0 0 8px rgba(40, 209, 232, 0.4),
    0 0 20px rgba(40, 209, 232, 0.2),
    0 0 40px rgba(40, 209, 232, 0.1);
  color: #28d1e8;
}
body:not([theme-mode="dark"]) .glow-text {
  text-shadow:
    0 0 8px rgba(0, 82, 217, 0.3),
    0 0 20px rgba(0, 82, 217, 0.15);
  color: var(--brand);
}

/* ==================== v5 新增：gradient-text 渐变文字 ==================== */
.gradient-text {
  background: linear-gradient(135deg, var(--brand), #28d1e8);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ==================== v5 新增：divider 分割线 ==================== */
.divider {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin: var(--sp-5) 0;
  color: var(--ink-3);
  font-size: var(--fs-xs);
}
.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
}
body.dark .divider::before,
body.dark .divider::after {
  background: linear-gradient(90deg, transparent, rgba(40, 209, 232, 0.2), transparent);
}

/* ==================== v5 新增：status-dot 状态点 ==================== */
.status-dot {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--fs-xs);
  color: var(--ink-2);
}
.status-dot::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.online::before { background: #2ba471; box-shadow: 0 0 6px rgba(43, 164, 113, 0.5); }
.status-dot.offline::before { background: var(--ink-3); }
.status-dot.warning::before { background: #e37318; box-shadow: 0 0 6px rgba(227, 115, 24, 0.5); }
.status-dot.error::before { background: #d54941; box-shadow: 0 0 6px rgba(213, 73, 65, 0.5); animation: pulse 1.5s infinite; }
.status-dot.busy::before { background: #e37318; animation: pulse 1.2s infinite; }

/* ==================== v5 新增：data-grid 数据网格 ==================== */
.data-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-3);
}
@media (max-width: 900px) {
  .data-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 520px) {
  .data-grid { grid-template-columns: 1fr; }
}
.data-grid .data-cell {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-3);
  text-align: center;
  transition: transform .15s ease, box-shadow .15s ease;
}
.data-grid .data-cell:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-1);
}
.data-grid .data-cell .cell-val {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  font-family: Bahnschrift, "DIN Alternate", "Segoe UI", var(--app-font);
}
.data-grid .data-cell .cell-lbl {
  font-size: var(--fs-xs);
  color: var(--ink-2);
  margin-top: var(--sp-1);
}

/* ==================== v5 新增：metric-row 指标行 ==================== */
.metric-row {
  display: flex;
  gap: var(--sp-4);
  flex-wrap: wrap;
  padding: var(--sp-3) 0;
}
.metric-row .metric-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 80px;
}
.metric-row .metric-val {
  font-size: var(--fs-xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  font-family: Bahnschrift, "DIN Alternate", "Segoe UI", var(--app-font);
}
.metric-row .metric-lbl {
  font-size: 11px;
  color: var(--ink-3);
}

/* ==================== 深色大屏专项（admin） ==================== */
body.dark .panel { border-color: rgba(40, 209, 232, 0.15); }
body.dark .panel-hd { border-color: rgba(40, 209, 232, 0.1); }
body.dark .panel-hd i { color: #28d1e8; }
body.dark .panel-hd h3 { color: #9fd8ff; letter-spacing: 1px; }

/* v5：深色模式下 panel-hd h3 发光 */
body.dark .panel-hd h3 {
  text-shadow: 0 0 8px rgba(40, 209, 232, 0.3);
}

/* v5：深色模式下 tbl th 背景加深 */
body.dark .tbl th {
  background: rgba(40, 209, 232, 0.06);
  border-bottom-color: rgba(40, 209, 232, 0.1);
}

/* v5：深色面板扫描线（可选，subtle） */
body.dark .panel::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(40, 209, 232, 0.008) 2px,
    rgba(40, 209, 232, 0.008) 4px
  );
  pointer-events: none;
  border-radius: var(--r-lg);
}

/* v5：应急闪烁效果 */
body.dark .emergency-flash {
  animation: emergencyFlash 1s ease-in-out infinite;
}
@keyframes emergencyFlash {
  0%, 100% { background-color: rgba(213, 73, 65, 0.05); }
  50% { background-color: rgba(213, 73, 65, 0.15); }
}
body.dark .emergency-flash .panel-hd h3 {
  color: #ff8f8a;
  text-shadow: 0 0 12px rgba(213, 73, 65, 0.5);
}

/* ==================== 响应式补充 ==================== */
/* v5：chat-panel 移动端适配 */
@media (max-width: 520px) {
  .chat-panel {
    right: 8px; left: 8px; width: auto; bottom: 80px;
  }
  .chat-fab { right: 16px; bottom: 16px; }
  main { padding: 0 var(--sp-3); }
}

/* v5：hero-stat 响应式 */
@media (max-width: 520px) {
  .hero-stat .hero-num { font-size: 36px; }
  .progress-ring { padding: var(--sp-2); }
}

/* v5：kpi-row 紧凑适配 */
@media (max-width: 600px) {
  .kpi-row { grid-template-columns: 1fr; }
  .metric-row { gap: var(--sp-3); }
}

</style>
</head>

/* ==================== v5 新增：粒子背景动画 ==================== */
/* 粒子系统：在登录页绘制缓慢移动的粒子连线效果 */
let _particlesRAF = null;
let _particlesCtx = null;
let _particles = [];

function initParticles() {
  const canvas = document.createElement("canvas");
  canvas.id = "particles";
  canvas.style.cssText = "position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0";
  const loginView = document.getElementById("login-view");
  if (loginView) {
    loginView.style.position = "relative";
    loginView.style.overflow = "hidden";
    loginView.insertBefore(canvas, loginView.firstChild);
  }
  const ctx = canvas.getContext("2d");
  _particlesCtx = ctx;
  /* 初始化50个粒子 */
  _particles = [];
  function resize() {
    canvas.width = loginView ? loginView.offsetWidth : window.innerWidth;
    canvas.height = loginView ? loginView.offsetHeight : window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);
  for (let i = 0; i < 50; i++) {
    _particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: Math.random() * 2 + 1,
      alpha: Math.random() * 0.4 + 0.1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    /* 绘制连线 */
    for (let i = 0; i < _particles.length; i++) {
      for (let j = i + 1; j < _particles.length; j++) {
        const dx = _particles[i].x - _particles[j].x;
        const dy = _particles[i].y - _particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const alpha = (1 - dist / 150) * 0.15;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(40, 209, 232, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(_particles[i].x, _particles[i].y);
          ctx.lineTo(_particles[j].x, _particles[j].y);
          ctx.stroke();
        }
      }
    }
    /* 绘制粒子 */
    _particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(40, 209, 232, ${p.alpha})`;
      ctx.fill();
      /* 移动粒子 */
      p.x += p.vx;
      p.y += p.vy;
      /* 边界回弹 */
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });
    _particlesRAF = requestAnimationFrame(draw);
  }
  draw();
}

/* 停止粒子动画（登录成功后调用） */
function stopParticles() {
  if (_particlesRAF) {
    cancelAnimationFrame(_particlesRAF);
    _particlesRAF = null;
  }
  const canvas = document.getElementById("particles");
  if (canvas) canvas.remove();
  _particles = [];
  _particlesCtx = null;
}

/* ==================== v5 新增：数字滚动动画 ==================== */
/* 从 0 滚动到目标值，easeOutExpo 缓动 */
function animateNumber(el, target, duration) {
  duration = duration || 800;
  /* 提取目标数值（支持带标签的HTML，取纯数字部分） */
  const targetStr = String(target);
  /* 如果包含 < 标签HTML，直接设置，不做动画 */
  if (targetStr.includes("<")) {
    if (el) el.innerHTML = targetStr;
    return;
  }
  const targetNum = parseFloat(targetStr);
  if (isNaN(targetNum)) {
    if (el) el.textContent = targetStr;
    return;
  }
  const isDecimal = targetStr.includes(".");
  const decimals = isDecimal ? (targetStr.split(".")[1] || "").length : 0;
  const start = performance.now();
  /* easeOutExpo 缓动函数 */
  function easeOutExpo(t) {
    return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
  }
  function tick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const easedProgress = easeOutExpo(progress);
    const current = easedProgress * targetNum;
    el.textContent = current.toFixed(decimals);
    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      el.textContent = targetStr;
    }
  }
  requestAnimationFrame(tick);
}

  return `<span class="t-tag t-tag--${theme || "default"} t-tag--light" style="border-radius:999px">${icon ? `<i class="${icon}" style="margin-right:3px"></i>` : ""}${esc(text)}</span>`;
}
function btn(label, onclick, opt) { // opt: {theme:"primary|danger|default", variant:"base|outline|text", icon, size}
  const o = opt || {};
  /* v5: 加 ripple 类 + hover 过渡动效 */
  const btnStyle = `transition:transform .15s ease,box-shadow .15s ease;cursor:pointer;`;
  const hoverCode = `onmouseenter="this.style.transform='scale(1.02)'" onmouseleave="this.style.transform='scale(1)'"`;
  return `<button class="t-button t-button--theme-${o.theme || "primary"} t-button--variant-${o.variant || "base"} t-size-${o.size || "s"} btn-ripple" style="${btnStyle}" onclick="${onclick}" ${hoverCode}>` +
    `${o.icon ? `<i class="${o.icon}" style="margin-right:4px"></i>` : ""}<span class="t-button__text">${label}</span></button>`;
}
function panel(icon, title, desc, body, extra) {
  /* v5: 增加面板进入动画类名 */
  return `<div class="panel panel-enter"><div class="panel-hd"><i class="${icon}"></i><h3>${title}</h3>` +
    `${desc ? `<span class="panel-desc">${desc}</span>` : ""}${extra ? `<span class="extra">${extra}</span>` : ""}</div>` +
    `<div class="panel-bd">${body}</div></div>`;
}
function kpi(icon, num, label, mood) {  // mood: good/warn/bad/""
  /* v5: 先显示 0，通过 data-target 实现数字动画 */
  const targetVal = String(num);
  return `<div class="kpi ${mood || ""}"><div class="ic"><i class="${icon}"></i></div>` +
    `<div><div class="num" data-countup="${esc(targetVal)}">0</div><div class="lbl">${label}</div></div></div>`;
}
function empty(icon, text) {
  /* v5: 图标加微浮动（通过注入的 CSS 动画类） */
  return `<div class="empty"><i class="${icon || "ri-inbox-line"}"></i><p>${esc(text || "暂无数据")}</p></div>`;
}
function rateStars(n) {
  let s = "";
  /* v5: 星星加逐个亮起的延迟动画 */
  for (let i = 1; i <= 5; i++) {
    const filled = i <= Math.round(n);
    const delay = i * 80;
    s += `<i class="ri-star-fill star-animate" style="color:${filled ? "#e8a52e" : "var(--line)"};font-size:14px;animation-delay:${delay}ms;opacity:${filled ? "1" : "0.4"}"></i>`;
  }
  return `<span style="letter-spacing:1px">${s}</span>`;
}
function toast(text, kind) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const ic = kind === "error" ? "ri-close-circle-line" : "ri-checkbox-circle-line";
  const t = h(`<div class="toast ${kind || "success"}"><i class="${ic}"></i><span>${esc(text)}</span></div>`).firstChild;
  document.body.appendChild(t);
  /* v5: 退场由 CSS 动画处理（2.8s 后 fadeOut），3.2s 后移除 DOM */
  setTimeout(() => t.remove(), 3200);
}

/* ---------------- ECharts：挂载队列 + 主题基色 ---------------- */
const _mountQueue = [];
function mount(fn) { _mountQueue.push(fn) }
function flushMount() {
  /* v5: flushMount 时触发所有 data-countup 数字动画 */
  document.querySelectorAll("[data-countup]").forEach(el => {
    const target = el.getAttribute("data-countup");
    if (target) animateNumber(el, target, 800);
  });
  /* 执行挂载队列 */
  while (_mountQueue.length) { try { _mountQueue.shift()() } catch (e) { console.warn(e) } }
}
function chart(el, option, height) {
  el.style.height = (height || 220) + "px";
  const c = echarts.init(el, null, { renderer: "canvas" });
  const dk = isDark();
  option.textStyle = { fontFamily: "PingFang SC, Microsoft YaHei, sans-serif", color: dk ? "#8fa9d6" : "#5f6b82" };
  if (option.xAxis) [].concat(option.xAxis).forEach(a => { a.axisLine = a.axisLine || { lineStyle: { color: dk ? "#22406e" : "#dcdcdc" } }; a.axisLabel = Object.assign({ color: dk ? "#8fa9d6" : "#7d8ba5", fontSize: 11 }, a.axisLabel) });
  if (option.yAxis) [].concat(option.yAxis).forEach(a => { a.splitLine = a.splitLine || { lineStyle: { color: dk ? "#16294f" : "#eef1f6" } }; a.axisLabel = Object.assign({ color: dk ? "#8fa9d6" : "#7d8ba5", fontSize: 11 }, a.axisLabel) });
  /* v5: 支持渐变色 series itemStyle gradient 对象 */
  if (option.series) [].concat(option.series).forEach(s => {
    /* 如果 itemStyle.color 是 {gradient} 对象，转换为 ECharts 渐变 */
    if (s.itemStyle && s.itemStyle.color && typeof s.itemStyle.color === "object" && s.itemStyle.color.gradient) {
      const g = s.itemStyle.color.gradient;
      const grad = new echarts.graphic.LinearGradient(g.direction || 0, g.x1 || 0, g.y1 || 0, g.x2 || 0, g.y2 || 1,
        (g.stops || []).map(st => ({ offset: st.offset || 0, color: st.color })));
      s.itemStyle.color = grad;
    }
    /* v5: 支持 animationDelay 回调 */
    if (s.animationDelay && typeof s.animationDelay === "function") {
      option.animationDelay = s.animationDelay;
      delete s.animationDelay;
    }
  });
  /* v5: 如果 option 中传入了 _theme，应用主题配置 */
  if (option._theme) {
    const theme = option._theme;
    if (theme.tooltip) option.tooltip = Object.assign(option.tooltip || {}, theme.tooltip);
    if (theme.legend) option.legend = Object.assign(option.legend || {}, theme.legend);
    delete option._theme;
  }
  c.setOption(option);
  window.addEventListener("resize", () => c.resize());
  return c;
}

/* v5: chartTheme() 返回深色/浅色完整主题对象 */
function chartTheme(mode) {
  const dk = mode === "dark" || isDark();
  return dk ? {
    tooltip: { backgroundColor: "rgba(14,28,60,0.9)", borderColor: "rgba(40,209,232,0.2)", textStyle: { color: "#dbe7ff", fontSize: 12 } },
    legend: { textStyle: { color: "#8fa9d6", fontSize: 11 } }
  } : {
    tooltip: { backgroundColor: "#fff", borderColor: "#dcdcdc", textStyle: { color: "rgba(0,0,0,.9)", fontSize: 12 } },
    legend: { textStyle: { color: "#5f6b82", fontSize: 11 } }
  };
}

async function quickLogin(u) {

  const loading = document.createElement("div");
  loading.className = "login-loading";
  loading.innerHTML = `<div class="spinner"></div><div class="load-text">正在进入系统...</div>`;
  document.body.appendChild(loading);
  try {
    SESSION = await api("/api/auth/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: u, password: "123456" })
    });
    /* 停止粒子动画 */
    stopParticles();
    /* v5: crossfade 过渡：先让 loading 淡出 */
    loading.classList.add("fade-out");
    /* 同时准备 app-view */

    av.classList.add("crossfade-enter");
    av.style.display = "";

      loading.remove();
      av.classList.remove("crossfade-enter");
    }, 400);
    /* 校长端 = 城运中心深色大屏：body.dark（自有令牌） + theme-mode（TDesign 暗色变量） */

    const roleLabel = { admin: "校长·安全第一责任人", parent: "家长", teacher: "班主任", community: "社区·红门管家" }[SESSION.role] || SESSION.role;
    document.getElementById("who").innerHTML = `<i class="ri-user-follow-line"></i> ${esc(SESSION.name)} · ${roleLabel}`;
    document.getElementById("chat-msgs").innerHTML = `<div class="msg bot">${esc(CHAT_HINT[SESSION.role] || CHAT_HINT.parent)}</div>`;
    if (SESSION.role === "parent") {

function logout() { document.body.classList.remove("dark"); document.documentElement.removeAttribute("theme-mode"); location.reload() }
function buildNav() {
  const nav = document.getElementById("nav"); nav.innerHTML = "";
  const items = ROLE_NAV[SESSION.role] || ROLE_NAV.parent;
  items.forEach(([k, label], i) => {
    const b = document.createElement("button");
    b.innerHTML = `<i class="${NAV_ICON[k] || "ri-apps-line"}"></i>${label}`;
    b.dataset.page = k; b.onclick = () => go(k);
    /* v5: 导航按钮逐个 fadein 出现 */
    b.classList.add("nav-fadein");
    b.style.animationDelay = `${i * 100}ms`;
    nav.appendChild(b);
    /* v5: 第一个自动激活动画从左到右滑入（已通过 nav-fadein 实现） */
    if (i === 0) go(k);
  });
}
function go(page) {
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("active", b.dataset.page === page));
  const m = document.getElementById("main");
  /* v5: 当前内容 fadeOut（opacity 0, translateY -10px） */
  m.classList.add("page-fade-out");
  /* v5: 骨架屏加计数动画（模拟数据加载感） */
  setTimeout(() => {
    m.classList.remove("page-fade-out");
    m.innerHTML = `<div class="skl" style="height:96px"><span class="skl-count">加载中 0%</span></div><div class="skl" style="height:220px"><span class="skl-count">加载中 0%</span></div><div class="skl" style="height:160px"><span class="skl-count">加载中 0%</span></div>`;
    /* 骨架屏计数动画：模拟加载进度 */
    const counters = m.querySelectorAll(".skl-count");
    let progress = 0;
    const countInterval = setInterval(() => {
      progress = Math.min(progress + Math.floor(Math.random() * 20 + 5), 95);
      counters.forEach(c => { c.textContent = `加载中 ${progress}%`; });
    }, 200);
    m.classList.add("page-fade-in");
    PAGES[page]().then(el => {
      clearInterval(countInterval);
      m.classList.remove("page-fade-in");
      m.innerHTML = "";
      m.appendChild(el);
      flushMount();
    }).catch(e => {
      clearInterval(countInterval);
      m.classList.remove("page-fade-in");
      m.innerHTML = `<div class="page-err"><i class="ri-alert-line"></i> 加载失败：${esc(e.message)}</div>`;
    });
  }, 200);
}

/* ---------------- 对话（v5 增强版） ---------------- */
let _chatOpen = false;
function toggleChat() {
  const p = document.getElementById("chat-panel");
  if (!_chatOpen) {
    p.style.display = "";
    /* v5: 面板展开 slide + scale 动画 */
    p.classList.remove("chat-enter");
    void p.offsetWidth; /* 触发 reflow */
    p.classList.add("chat-enter");
    _chatOpen = true;
  } else {
    /* v5: 面板收起：先加淡出再隐藏 */
    p.style.opacity = "0";
    p.style.transform = "scale(.92) translateY(10px)";
    p.style.transition = "all .2s ease";
    setTimeout(() => {
      p.style.display = "none";
      p.style.opacity = ""; p.style.transform = ""; p.style.transition = "";
      p.classList.remove("chat-enter");
    }, 200);
    _chatOpen = false;
  }
}
async function sendChat() {
  const inp = document.getElementById("chat-input"), box = document.getElementById("chat-msgs");
  const text = inp.value.trim(); if (!text) return; inp.value = "";
  /* v5: 消息加时间戳 */
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0");
  box.appendChild(h(`<div class="msg me">${esc(text)}<div class="msg-time">${timeStr}</div></div>`).firstChild);
  box.scrollTop = box.scrollHeight;
  /* v5: 显示打字指示器（三个跳动的点） */
  const typing = document.createElement("div");
  typing.className = "typing-indicator";
  typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
  box.appendChild(typing);
  box.scrollTop = box.scrollHeight;
  try {
    const r = await api("/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ role: SESSION.role, message: text })
    });
    /* v5: 1秒后移除打字指示器并显示回复 */
    setTimeout(() => {
      typing.remove();
      let extra = "";
      if (r.intent === "query_hazard" && Array.isArray(r.data))
        extra = r.data.length ? "<br>" + r.data.map(d => `· ${HZL[d.hazard_class] || d.hazard_class} @ ${esc(d.zone)}（${SEV[d.severity]}）`).join("<br>") : "<br>当前无活跃风险 ✓";
      if (r.intent === "query_plan" && r.data) extra = `<br>当前模式：<b>${esc(r.data.mode)}</b>${r.data.alert ? "（" + esc(r.data.alert) + "）" : ""}`;
      /* v5: bot 消息也加时间戳 */
      const replyTime = new Date();
      const replyTimeStr = replyTime.getHours().toString().padStart(2, "0") + ":" + replyTime.getMinutes().toString().padStart(2, "0");
      box.appendChild(h(`<div class="msg bot">${esc(r.reply)}${extra}<div class="msg-time">${replyTimeStr}</div></div>`).firstChild);
      box.scrollTop = box.scrollHeight;
      const jump = {
        query_hazard: "hazards", query_plan: "matrix", query_canteen: "canteen", query_asset: "assets",
        report_incident: "report", query_safety: "travel", find_resource: "spaces", book_resource: "spaces",
        query_health: "child", query_course: "courses", ask_leave: "leave", query_meal: "meals"
      }[r.intent];
      if (jump && (ROLE_NAV[SESSION.role] || []).some(([k]) => k === jump)) go(jump);
    }, 1000);
  } catch (e) {
    typing.remove();
    box.appendChild(h(`<div class="msg bot">出错了：${esc(e.message)}</div>`).firstChild);
    box.scrollTop = box.scrollHeight;
  }
}

async function runScenario(name) {
  const tl = document.getElementById("dz-tl"); tl.style.display = ""; tl.innerHTML = `<i class="ri-loader-4-line spin"></i> 注入中…`;

async function pgMeals() {
  if (!CHILD) return h(empty("ri-restaurant-line", "未关联孩子档案"));
  const month = curMonth();
  const [plan, bill] = await Promise.all([
    api(`/api/meals/plan/${CHILD.id}/${month}?operator_id=${SESSION.user_id}`),
    api(`/api/meals/bill/${CHILD.id}/${month}?operator_id=${SESSION.user_id}`)]);
  const checked = new Set(plan ? plan.days : []);
  const [y, m] = month.split("-").map(Number);
  const first = new Date(y, m - 1, 1), dim = new Date(y, m, 0).getDate();
  const lead = (first.getDay() + 6) % 7;
  let cells = "";
  for (let i = 0; i < lead; i++) cells += "<div class='d blank'></div>";
  for (let d = 1; d <= dim; d++) {
    const dow = new Date(y, m - 1, d).getDay();
    const wk = dow === 0 || dow === 6;
    cells += `<div class="d ${wk ? "off" : (checked.has(d) ? "on" : "")}" data-d="${d}" ${wk ? "" : `onclick="toggleMealDay(this)"`}>${d}</div>`;
  }
  const el = h(`<div class="grid g2">
    ${panel("ri-calendar-todo-line", `${month} 用餐日历（${esc(CHILD.name)}）`, "",
      `${plan && plan.billed ? tag("本月已出账 · 锁定", "default", "ri-lock-line") : ""}
      <div class="muted">勾选在校用餐的日子（周末不供餐）。原来在微信群里接龙报饭，现在在这里管起来——后厨按勾选人数备餐，班主任能看到台账。</div>

      ${plan && plan.billed ? "" : `<div style="margin-top:12px">${btn("保存本月用餐安排", `saveMeals('${month}')`, { icon: "ri-check-line", size: "m" })}</div>`}
      <div class="muted" id="ml-msg" style="margin-top:8px"></div>
      <div class="muted" style="margin-top:8px">请假获批时若与用餐日重叠，系统只做提示、由家长自行调整——不自动动钱。</div>`)}
    ${panel("ri-bank-card-line", "本月账单预览", "后付费 · 无余额",
      `<div style="display:flex;justify-content:center;margin:var(--sp-4) 0">
        ${heroStat("ri-money-cny-circle-line", "¥" + bill.amount, "本月餐费", `${bill.days_count}天 × ¥${bill.price_per_meal}/餐`)}
      </div>
      <div class="notice"><i class="ri-money-cny-circle-line"></i><div class="bd"><b>缴费方式</b><div class="muted">${esc(bill.payment)}</div></div></div>
      ${metricRow([
        { icon: "ri-calendar-check-line", num: bill.days_count, label: "用餐天数" },
        { icon: "ri-money-cny-circle-line", num: "¥" + bill.price_per_meal, label: "单餐价格" },
      ])}`)}
  </div>`);
  return el;

        <td>${esc(a.name)} ×${a.quantity}</td><td>${esc(a.location)}</td><td>${a.purchased_year || "—"}</td>

async function reportAsset(code) {
  const desc = prompt(`资产 ${code} 报修描述（模拟扫二维码后填写）：`, "课桌腿松动摇晃");
  if (!desc) return;
  const r = await api(`/api/assets/${code}/report`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reporter_id: SESSION.user_id, description: desc })
  });
  toast(`报修成功！工单 ${r.ticket_no} 已派 ${r.assignee}`); go("assets");
}

  box.innerHTML = list.length ? list.map(v => `<div class="notice" style="margin-top:6px;margin-bottom:0"><i class="ri-user-star-line"></i><div class="bd">

async function submitReview() {
  const msg = document.getElementById("rv-msg");
  try {
    await api("/api/venue-reviews", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        resource_id: Number(document.getElementById("rv-res").value),
        teacher_id: SESSION.user_id, rating: Number(document.getElementById("rv-rating").value),
        comment: document.getElementById("rv-comment").value.trim(),

}

      ${panel("ri-calendar-todo-line", "我的预约", "",
        mine.length ? mine.map(b => `<div class="list-item" style="border-left-color:${bkColor[b.status] || C_BLUE};border-left-width:3px"><b>${b.booking_no}</b> ${b.date} ${b.start_time}-${b.end_time}
        ${tag(BKL[b.status], b.status === "confirmed" ? "success" : (b.status === "pending" ? "warning" : "default"))}
        <div class="muted">${esc(b.purpose)}</div></div>`).join("") : empty("ri-calendar-line", "暂无预约"))}
    </div></div>`);
  return el;
}
async function bookRes(id, name) {
  const date = prompt(`预约「${name}」日期（YYYY-MM-DD）：`, "2026-09-15"); if (!date) return;
  const st = prompt("开始时间（HH:MM）：", "16:00"), et = prompt("结束时间（HH:MM）：", "17:00");
  const purpose = prompt("用途：", "应急疏散演练"); if (!st || !et || !purpose) return;
  try {
    const b = await api("/api/resources/bookings", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resource_id: id, user_id: SESSION.user_id, date, start_time: st, end_time: et, purpose, attendees: 30 })
    });
    toast("预约已提交，等待社区侧审批：" + b.booking_no); go("spaces");
  } catch (e) { toast("预约失败：" + e.message, "error") }
}

/* ==================== 17. 预约审批（community） ==================== */
async function pgApprovals() {
  const [bookings, resources] = await Promise.all([
    api("/api/resources/bookings/list"), api("/api/resources")]);
  const rName = Object.fromEntries(resources.map(r => [r.id, r.name]));
  const pending = bookings.filter(b => b.status === "pending");
  const done = bookings.filter(b => b.status !== "pending").slice(0, 10);
  const el = h(`<div>
    ${divider("社区侧核对时段/容量后批准")}
    <div class="grid g2">
    ${panel("ri-time-line", `待审批预约 ${badge(pending.length, pending.length > 5 ? "danger" : "")}`, "",
      pending.length ? pending.map(b => `<div class="list-item" style="border-left-color:${C_ORANGE};border-left-width:3px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <b>${b.booking_no}</b> · ${esc(rName[b.resource_id] || "#" + b.resource_id)}
        </div>
        <div class="muted">${b.date} ${b.start_time}-${b.end_time} · ${esc(b.purpose)} · ${b.attendees}人</div>
        <div style="margin-top:8px;display:flex;gap:8px" class="approve-btns">
          ${btn("批准", `approveBk('${b.booking_no}','confirmed',this)`, { icon: "ri-check-line" })}
          ${btn("驳回", `approveBk('${b.booking_no}','cancelled',this)`, { theme: "danger", variant: "outline", icon: "ri-close-line" })}
        </div></div>`).join("") : empty("ri-checkbox-circle-line", "暂无待审批预约"))}
    ${panel("ri-history-line", "已处理记录", "",
      done.length ? done.map(b => `<div class="list-item" style="border-left-color:${b.status === "confirmed" ? C_GREEN : C_RED};border-left-width:3px"><b>${b.booking_no}</b> · ${esc(rName[b.resource_id] || "")}
        ${tag(BKL[b.status], b.status === "confirmed" ? "success" : "default")}
        <div class="muted">${b.date} ${b.start_time}-${b.end_time} · ${esc(b.purpose)}</div></div>`).join("") : empty("ri-history-line", "暂无记录"))}
    </div></div>`);
  return el;
}
async function approveBk(no, to, btnEl) {
  /* 审批按钮确认状态 */
  const btns = btnEl.closest(".approve-btns");
  if (btns) {
    btns.innerHTML = `<span style="font-size:13px;color:${to === "confirmed" ? C_GREEN : C_RED};animation:fadein .3s ease"><i class="${to === "confirmed" ? "ri-checkbox-circle-line" : "ri-close-circle-line"}"></i> ${to === "confirmed" ? "已批准" : "已驳回"}，正在同步…</span>`;
  }
  try {
    await api(`/api/resources/bookings/${no}/status?status=${to}&operator_id=${SESSION.user_id}`, { method: "PATCH" });
    toast(to === "confirmed" ? "已批准" : "已驳回"); go("approvals");
  } catch (e) { toast("操作失败：" + e.message, "error") }
}

/* ==================== 18. 随手拍（parent/teacher） ==================== */
async function pgReport() {
  const mine = (await api("/api/incidents?limit=50")).filter(i => i.reporter_id === SESSION.user_id);
  const stColor = { reported: C_BLUE, dispatched: C_CYAN, processing: C_ORANGE, resolved: C_GREEN, closed: "var(--ink-3)" };
  const el = h(`<div class="grid g2">
    ${panel("ri-camera-line", "随手拍上报", "AI自动分类→派单，并作为citizen模态参与风险交叉印证",
      `<div class="form-row"><label>问题描述</label>
      <textarea id="rp-desc" class="native" rows="4" placeholder="例：东门下凹路段积水很深，孩子过不去 / 食堂饭菜有异物 / 六年级1班课桌摇晃…"></textarea></div>
      <div class="form-row"><label>位置</label>
      <select id="rp-loc" class="native"><option>东门</option><option>东门下凹路段</option><option>南门</option><option>京开辅路口</option><option>食堂后厨</option><option>翻新教室(六年级1班)</option><option>六年级教学楼</option><option>操场</option></select></div>
      <div style="display:flex;align-items:center;gap:6px;margin:var(--sp-2) 0;color:var(--ink-3);font-size:var(--fs-xs)">
        <i class="ri-image-add-line"></i> 可在此处拖拽添加现场照片（功能开发中）
      </div>
      ${btn("提交上报", "submitReport()", { icon: "ri-send-plane-fill", size: "m" })}
      <div class="muted" id="rp-msg" style="margin-top:8px"></div>`)}
    ${panel("ri-history-line", "我的上报", "",
      mine.length ? `<div class="report-timeline">${mine.map(i => `<div class="list-item" style="border-left-color:${stColor[i.status] || C_BLUE};border-left-width:3px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <b>${i.ticket_no}</b> ${tag(CATL[i.category], "primary")}
          ${tag(STL[i.status], i.status === "resolved" || i.status === "closed" ? "success" : "warning")}
          <span class="muted" style="margin-left:auto"><i class="ri-time-line"></i> ${fmt(i.created_at)}</span>
        </div>
        <div class="muted" style="margin-top:3px">${esc(i.description.slice(0, 80))}${i.description.length > 80 ? "…" : ""} → ${esc(i.assignee || "")}</div></div>`).join("")}</div>` : empty("ri-camera-line", "暂无上报记录"))}
  </div>`);
  return el;
}
async function submitReport() {
  const desc = document.getElementById("rp-desc").value.trim(), loc = document.getElementById("rp-loc").value;
  const msg = document.getElementById("rp-msg");
  if (desc.length < 2) { msg.textContent = "请填写描述"; return }
  try {
    const r = await api("/api/incidents", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reporter_id: SESSION.user_id, description: desc, location: loc })
    });
    msg.innerHTML = `<i class="ri-checkbox-circle-line" style="color:#2ba471"></i> 工单 <b>${r.ticket_no}</b>：AI识别[${CATL[r.category]}]（置信度${r.confidence}），已派 ${esc(r.assignee)}`;
    document.getElementById("rp-desc").value = "";
  } catch (e) { msg.textContent = "失败：" + e.message }
}

initLogin();
</script>
</body>
